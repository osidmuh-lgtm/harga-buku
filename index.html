<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools Profit Buku</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .hasil {
      margin-top: 25px;
      background: #f9fafb;
      padding: 20px;
      border-radius: 15px;
    }

    .hasil p {
      margin: 10px 0;
      font-size: 17px;
    }

    .profit {
      font-size: 24px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tools Hitung Profit Buku</h1>

    <label>Nama Buku</label>
    <select id="bukuSelect"></select>

    <label>Qty</label>
    <input type="number" id="qty" placeholder="Masukkan qty" />

    <label>Biaya Iklan</label>
    <input type="number" id="iklan" placeholder="Masukkan biaya iklan" />

    <button onclick="hitungProfit()">Hitung Profit</button>

    <div class="hasil" id="hasil" style="display:none;">
      <p id="hargaJual"></p>
      <p id="modal"></p>
      <p id="omzet"></p>
      <p id="biayaIklan"></p>
      <p class="profit" id="profit"></p>
    </div>
  </div>

  <script>
    const daftarBuku = [
      { nama: 'SUPER LENGKAP 6 IN 1', modal: 42000, jual: 52650 },
      { nama: '30 DONGENG SEBELUM TIDUR', modal: 25000, jual: 31590 },
      { nama: '60 JAM BACA TULIS TANPA DIEJA - NEW', modal: 26000, jual: 33210 },
      { nama: 'AYO BACA SENDIRI DONGENG SOPAN SANTUN', modal: 22000, jual: 28350 },
      { nama: '(SIAP-SIAP MASUK SD) JAGO CALISTUNG TK', modal: 18000, jual: 23490 },
      { nama: 'AYO BACA SENDIRI BUKU DONGENG PERTAMAKU', modal: 22000, jual: 28350 },
      { nama: 'AYOU BACA SENDIRI KISAH 25 NABI DAN RASUL', modal: 25000, jual: 31590 },
      { nama: '(SIAP-SIAP MASUK SD) 10 Menit JAGO CALISTUNG TK', modal: 20000, jual: 25920 },
      { nama: '(SIAP-SIAP MASUK SD) 10 Menit JAGO BACA TANPA DI EJA', modal: 20000, jual: 25920 },
      { nama: '60 JAM LANCAR BACA LEWAT CERITA', modal: 20000, jual: 25920 },
      { nama: 'HAFAL HADIST LEWAT CERITA SEHARI-HARI', modal: 18200, jual: 23490 },
      { nama: 'AKU BISA MENULIS DENGAN RAPI', modal: 15000, jual: 20250 },
      { nama: 'LATIHAN MENULIS TEGAK BERSAMBUNG', modal: 15000, jual: 20250 },
      { nama: 'LATIHAN MENULIS DENGAN RAPIH', modal: 15000, jual: 20250 },
      { nama: 'PINTAR MENULIS DENGAN RAPI', modal: 7500, jual: 10530 },
      { nama: 'PINTAR MEMBACA TANPA MENGEJA', modal: 7500, jual: 10530 },
      { nama: 'PINTAR BERHITUNG TK', modal: 7500, jual: 10530 },
      { nama: 'SIAP SIAP MASUK SD BELAJAR PENJUMLAHAN PENGURANGAN', modal: 7500, jual: 10530 },
      { nama: 'LATIHAN KECERDASAN IQ ANAK', modal: 7500, jual: 10530 },
      { nama: 'MENGENAL HURUF A-Z', modal: 7500, jual: 10530 },
      { nama: 'PENJUMLAHAN 1-100', modal: 9500, jual: 12960 },
      { nama: 'PENGURANGAN 1-100', modal: 7500, jual: 10530 },
      { nama: 'MENULIS 400 KOSA KATA BAHASA INGGRIS', modal: 9000, jual: 12960 },
      { nama: 'PENJUMALAHAN & PENGURANGAN BERSUSUN 1-1000', modal: 7500, jual: 23490 },
      { nama: 'SI KECIL JAGO EXPERIMEN', modal: 18000, jual: 22555 },
      { nama: '10 menit jago membaca', modal: 21000, jual: 26025 },
      { nama: 'New 60 Jam', modal: 25000, jual: 30652 },
      { nama: '7 Surat', modal: 19000, jual: 23712 },
      { nama: 'Buku Cerita Anak Islam / Sirah Nabawi', modal: 20000, jual: 24584 },
      { nama: 'IQ Anak', modal: 7500, jual: 10410 },
      { nama: 'Jus Amma Super Lengkap', modal: 37000, jual: 45689 },
      { nama: 'Lancar Baca', modal: 30000, jual: 36207 },
      { nama: 'TBUN', modal: 44000, jual: 52629 }
    ];

    const select = document.getElementById('bukuSelect');

    daftarBuku.forEach((buku, index) => {
      const option = document.createElement('option');
      option.value = index;
      option.textContent = buku.nama;
      select.appendChild(option);
    });

    function rupiah(angka) {
      return 'Rp ' + angka.toLocaleString('id-ID');
    }

    function hitungProfit() {
      const buku = daftarBuku[select.value];
      const qty = parseInt(document.getElementById('qty').value) || 0;
      const iklan = parseInt(document.getElementById('iklan').value) || 0;

      const omzet = buku.jual * qty;
      const totalModal = buku.modal * qty;
      const profit = omzet - totalModal - iklan;

      document.getElementById('hasil').style.display = 'block';

      document.getElementById('hargaJual').innerHTML = `Harga Jual: <b>${rupiah(buku.jual)}</b>`;
      document.getElementById('modal').innerHTML = `Total Modal: <b>${rupiah(totalModal)}</b>`;
      document.getElementById('omzet').innerHTML = `Omzet: <b>${rupiah(omzet)}</b>`;
      document.getElementById('biayaIklan').innerHTML = `Biaya Iklan: <b>${rupiah(iklan)}</b>`;
      document.getElementById('profit').innerHTML = `Profit Bersih: ${rupiah(profit)}`;
    }
  </script>

</body>
</html>
