<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kasir Buku Anak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(to bottom, #fef9c3, #bae6fd);
      padding: 10px;
    }

    .container {
      max-width: 360px; /* 🔥 lebih compact */
      margin: auto;
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
      color: #f97316;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-add {
      background: #22c55e;
      color: white;
    }

    .btn-delete {
      background: #f87171;
      color: white;
      margin-top: 6px;
      font-size: 12px;
      padding: 6px;
    }

    .item {
      background: #f0f9ff;
      padding: 8px;
      border-radius: 10px;
      margin-top: 8px;
      border: 1.5px dashed #bae6fd;
      font-size: 12px;
    }

    .item b {
      font-size: 13px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
    }

    .qty-input {
      width: 60px;
      padding: 4px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 12px;
    }

    .summary {
      margin-top: 12px;
      padding: 10px;
      background: #fff7ed;
      border-radius: 12px;
      border: 1.5px solid #fdba74;
      font-size: 13px;
    }

    .summary h3 {
      font-size: 14px;
      margin-bottom: 5px;
    }

  </style>
</head>

<body>

<div class="container">
  <h2>📚 Kasir Buku</h2>

  <select id="product">
    <option value="">📖 Pilih Buku</option>
  </select>

  <input type="number" id="qty" placeholder="Qty">

  <button class="btn-add" onclick="tambahItem()">➕ Tambah</button>

  <div id="list"></div>

  <div class="summary" id="summary"></div>
</div>

<script>
const dataProduk = [
  { nama: "SUPER LENGKAP 6 IN 1", jual: 65000, modal: 43500 },
  { nama: "30 DONGENG SEBELUM TIDUR", jual: 39000, modal: 26500 },
  { nama: "60 JAM BACA", jual: 41000, modal: 27500 },
  { nama: "AYO BACA SENDIRI", jual: 35000, modal: 23500 },
  { nama: "IQ Anak", jual: 13000, modal: 9000 },
  { nama: "Juz Amma Super Lengkap", jual: 56000, modal: 39500 },
  { nama: "Lancar Baca", jual: 45000, modal: 31500 },
  { nama: "TBUN", jual: 65000, modal: 45500 }
];

let keranjang = [];

const select = document.getElementById("product");
dataProduk.forEach(p => {
  let opt = document.createElement("option");
  opt.value = p.nama;
  opt.textContent = p.nama;
  select.appendChild(opt);
});

function tambahItem() {
  const nama = document.getElementById("product").value;
  const qty = parseInt(document.getElementById("qty").value);

  if (!nama || !qty) {
    alert("Isi dulu ya 😊");
    return;
  }

  const produk = dataProduk.find(p => p.nama === nama);

  keranjang.push({
    nama,
    qty,
    jual: produk.jual,
    modal: produk.modal
  });

  render();
}

function hapusItem(index) {
  keranjang.splice(index, 1);
  render();
}

function updateQty(index, newQty) {
  keranjang[index].qty = parseInt(newQty) || 0;
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let totalOmzet = 0;
  let totalModal = 0;
  let totalProfit = 0;

  keranjang.forEach((item, index) => {
    const omzet = item.jual * item.qty;
    const modal = item.modal * item.qty;
    const profit = omzet - modal;

    totalOmzet += omzet;
    totalModal += modal;
    totalProfit += profit;

    list.innerHTML += `
      <div class="item">
        <b>📘 ${item.nama}</b>
        <div class="row">
          Qty:
          <input class="qty-input" type="number" value="${item.qty}" 
          onchange="updateQty(${index}, this.value)">
        </div>
        <div class="row">
          <span>📦 Rp ${modal.toLocaleString()}</span>
          <span>💰 Rp ${profit.toLocaleString()}</span>
        </div>
        <button class="btn-delete" onclick="hapusItem(${index})">Hapus</button>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML = `
    <h3>📊 Ringkasan</h3>
    <p>Omzet: Rp ${totalOmzet.toLocaleString()}</p>
    <p>Modal: Rp ${totalModal.toLocaleString()}</p>
    <p><b>Profit: Rp ${totalProfit.toLocaleString()}</b></p>
  `;
}
</script>

</body>
</html>
