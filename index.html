<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Buku</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 520px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      margin-bottom: 15px;
    }

    h2, h3 {
      margin: 0 0 10px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    .item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .price {
      font-weight: bold;
      color: #2c7be5;
    }

    button {
      margin-top: 6px;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-add {
      background: #2c7be5;
      color: white;
    }

    .btn-remove {
      background: #ff4d4f;
      color: white;
      margin-left: 5px;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      color: green;
      margin-top: 10px;
    }

    .btn-copy {
      background: #28a745;
      color: white;
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
    }

    .empty {
      color: #888;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h2>📚 Kasir Buku</h2>
      <input type="text" id="search" placeholder="Cari buku...">
      <div id="hasil"></div>
    </div>

    <div class="card">
      <h3>🛒 Keranjang</h3>
      <div id="cartList"></div>
      <div class="total" id="total">Total: Rp0</div>
      <button class="btn-copy" onclick="copyTotal()">Copy Total</button>
    </div>

  </div>

  <script>
    const data = [
      { nama: "60 jam belajar membaca", harga: 25000 },
      { nama: "iq anak", harga: 7500 },
      { nama: "jus amma super lengkap", harga: 38000 },
      { nama: "kisah 25 nabi dan rasul", harga: 20000 },
      { nama: "pintar menulis rapi", harga: 7500 },
      { nama: "lancar baca", harga: 30000 },
  { nama: "super lengkap 6 in 1", harga: 43500 },
  { nama: "30 dongeng sebelum tidur", harga: 26500 },
  { nama: "ayo baca sendiri dongeng pertamaku", harga: 23500 },
  { nama: "ayo baca sendiri dongeng sopan santun", harga: 23500 },
  { nama: "ayo baca sendiri kisah 25 nabi dan rasul", harga: 26500 },
  { nama: "hafal hadist lewat cerita sehari-hari", harga: 19700 },
  { nama: "60 jam baca tulis tanpa dieja", harga: 27500 },
  { nama: "60 jam lancar baca lewat cerita", harga: 21500 },
  { nama: "10 menit jago baca tanpa dieja", harga: 21500 },
  { nama: "10 menit jago calistung tk", harga: 21500 },
  { nama: "siap siap masuk sd jago calistung tk", harga: 19500 },
  { nama: "siap siap masuk sd penjumlahan pengurangan", harga: 7500 },
  { nama: "golden age book mengenal angka 1-10", harga: 23500 },
  { nama: "golden age book dasar-dasar calistung", harga: 23500 },
  { nama: "wipe and clean aktivitas pertamaku usia 3+", harga: 23500 },
  { nama: "aku bisa menulis dengan rapi", harga: 16500 },
  { nama: "latihan menulis tegak bersambung", harga: 16500 },
  { nama: "latihan menulis dengan rapi", harga: 16500 },
  { nama: "pintar menulis dengan rapi", harga: 7500 },
  { nama: "pintar membaca tanpa mengeja", harga: 7500 },
  { nama: "pintar berhitung tk", harga: 7500 },
  { nama: "latihan kecerdasan iq anak", harga: 7500 },
  { nama: "mengenal huruf a-z", harga: 7500 },
  { nama: "penjumlahan 1-100", harga: 11000 },
  { nama: "pengurangan 1-100", harga: 7500 },
  { nama: "menulis 400 kosa kata bahasa inggris", harga: 10500 },
  { nama: "paud kreatif mewarnai dinosaurus", harga: 7500 },
  { nama: "paud kreatif mewarnai hewan lucu", harga: 7500 },
  { nama: "paud kreatif mewarnai mobil balap", harga: 7500 },
  { nama: "paud kreatif mewarnai transportasi", harga: 7500 },
  { nama: "penjumlahan & pengurangan bersusun 1-1000", harga: 19500 }
];
      
    ];

    let cart = [];

    const searchInput = document.getElementById("search");
    const hasilDiv = document.getElementById("hasil");
    const cartList = document.getElementById("cartList");
    const totalDiv = document.getElementById("total");

    searchInput.addEventListener("input", function() {
      let input = this.value.toLowerCase();
      let hasil = data.filter(item => item.nama.includes(input));
      tampilkan(hasil);
    });

    function tampilkan(list) {
      if (list.length === 0) {
        hasilDiv.innerHTML = "<div class='empty'>Tidak ditemukan</div>";
        return;
      }

      hasilDiv.innerHTML = list.map(item => `
        <div class="item">
          ${item.nama}<br>
          <span class="price">Rp${item.harga.toLocaleString()}</span><br>
          <button class="btn-add" onclick="tambah('${item.nama}', ${item.harga})">Tambah</button>
        </div>
      `).join("");
    }

    function tambah(nama, harga) {
      cart.push({ nama, harga });
      renderCart();
    }

    function hapus(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      let total = 0;

      if (cart.length === 0) {
        cartList.innerHTML = "<div class='empty'>Belum ada item</div>";
        totalDiv.innerHTML = "Total: Rp0";
        return;
      }

      cartList.innerHTML = cart.map((item, i) => {
        total += item.harga;
        return `
          <div class="item">
            ${item.nama}<br>
            Rp${item.harga.toLocaleString()}
            <button class="btn-remove" onclick="hapus(${i})">Hapus</button>
          </div>
        `;
      }).join("");

      totalDiv.innerHTML = "Total: Rp" + total.toLocaleString();
    }

    function copyTotal() {
      let text = totalDiv.innerText;
      navigator.clipboard.writeText(text);
      alert("Total berhasil disalin!");
    }
  </script>

</body>
</html>
